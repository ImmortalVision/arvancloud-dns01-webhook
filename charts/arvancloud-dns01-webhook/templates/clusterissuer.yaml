{{- if .Values.clusterIssuer.enabled }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.clusterIssuer.name }}
  labels:
    {{- include "arvancloud-dns01-webhook.labels" . | nindent 4 }}
spec:
  acme:
    email: {{ required "clusterIssuer.email is required when clusterIssuer.enabled=true" .Values.clusterIssuer.email }}
    server: {{ .Values.clusterIssuer.server }}
    privateKeySecretRef:
      name: {{ .Values.clusterIssuer.privateKeySecretName }}
    solvers:
      - dns01:
          webhook:
            groupName: {{ .Values.groupName }}
            solverName: {{ .Values.clusterIssuer.solver.solverName }}
            config:
              apiKeySecretRef:
                name: {{ required "clusterIssuer.solver.apiKeySecretRef.name is required when clusterIssuer.enabled=true" .Values.clusterIssuer.solver.apiKeySecretRef.name }}
                key: {{ required "clusterIssuer.solver.apiKeySecretRef.key is required when clusterIssuer.enabled=true" .Values.clusterIssuer.solver.apiKeySecretRef.key }}
                namespace: {{ .Values.clusterIssuer.solver.apiKeySecretRef.namespace }}
              {{- with .Values.clusterIssuer.solver.zone }}
              zone: {{ . }}
              {{- end }}
              ttl: {{ .Values.clusterIssuer.solver.ttl }}
              apiEndpoint: {{ .Values.clusterIssuer.solver.apiEndpoint }}
{{- end }}
